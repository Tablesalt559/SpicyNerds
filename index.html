		<style>
		.header {
		font-family: 'Pacifico', cursive;
		color: darkred;
		text-align: center;
		font-size: 200%;
		background-color: pink;
		}

		body {
		background-image: url("pictures/background.jpg");
		}

		.basic {
			text-align: center;
			font-family: 'Pacifico', cursive;
			color: DarkRed;	
			font-size: 200%;
		}
	.btn {
  position: relative;
  display: block;
  width: 100px;
  height: 100px;
  background-color: red; /* Hot pink */
  margin: 80px auto;  /* Gives the heart room to breathe */
  
  /* Text formatting */
  color: hotpink;
  text-decoration: none;
  text-align: center;
  line-height: 100px; /* Centers text vertically */
  font-weight: bold;
  /* 1. Set the default transform state */
  transform: rotate(-45deg) scale(1);
  
  /* 2. Apply the animation */
  /* 'heartbeat' is the name, '1.2s' is the duration, 'infinite' makes it loop forever */
  animation: heartbeat 1.2s infinite ease-in-out;
}

/* Creating the left rounded lobe */
.btn::before {
  content: "";
  position: absolute;
  width: 100px;
  height: 100px;
  background-color: red;
  border-radius: 50%;
  top: -50px;
  left: 0;
}

/* Creating the top rounded lobe */
.btn::after {
  content: "";
  position: absolute;
  width: 100px;
  height: 100px;
  background-color: red;
  border-radius: 50%;
  top: 0;
  left: 50px;
} 

.btn span {
  display: block;
  transform: rotate(45deg); /* Counter-rotates the text so it's straight */
  position: relative;
  z-index: 1; /* Puts the text on top of the pink lobes */
}

/* 3. The Heartbeat Animation Keyframes */
@keyframes heartbeat {
  0% {
    transform: rotate(-45deg) scale(1);
  }
  14% {
    transform: rotate(-45deg) scale(1.15); /* First thud */
  }
  28% {
    transform: rotate(-45deg) scale(1); /* Brief return */
  }
  42% {
    transform: rotate(-45deg) scale(1.15); /* Second thud (double beat) */
  }
  70% {
    transform: rotate(-45deg) scale(1); /* Return to rest */
  }
  100% {
    transform: rotate(-45deg) scale(1); /* Idle pause before next beat */
  }
}

	
		</style>
	</head>
